# Dependabot — automated dependency + base-image update PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # JS dependencies for the Discord bot (reads package.json + bun.lock).
  - package-ecosystem: "npm"
    directory: "/discord-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      discord-bot-deps:
        patterns: ["*"]

  # Pinned base-image digest for the Discord bot Dockerfile.
  - package-ecosystem: "docker"
    directory: "/discord-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"

  # Pinned base-image digest for the chat-server Dockerfile.
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"
