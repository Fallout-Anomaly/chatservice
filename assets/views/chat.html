<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
  
  body {
    width: 100vw; height: 100vh;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
    background: transparent;
  }
  
  /* MMO-style Chat Container */
  .chat-container {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 450px;
    height: 300px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    /* Allow resizing by dragging the bottom-right corner */
    resize: both;
    overflow: hidden;
    min-width: 250px;
    min-height: 150px;
    max-width: 50vw;
    max-height: 80vh;
    transition: opacity 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .chat-container.hidden {
    opacity: 0;
    pointer-events: none;
  }
  
  /* Unobtrusive Header */
  .chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    cursor: default;
  }
  
  .brand {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .header-actions {
    display: flex;
    gap: 8px;
  }
  
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .icon-btn:hover { color: #fff; }
  
  .icon-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }
  
  /* Compact Messages Area */
  .messages {
    flex-grow: 1;
    overflow-y: auto;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px; /* Very tight spacing */
    font-size: 14px;
    line-height: 1.4;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
  }
  
  /* Custom Scrollbar */
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { 
    background: rgba(255, 255, 255, 0.2); 
    border-radius: 4px; 
  }
  .messages::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
  
  .msg-row {
    word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  .msg-time { 
    color: #888; 
    font-size: 12px;
    margin-right: 4px;
  }
  
  .msg-sender { 
    font-weight: 600; 
    color: #4ade80; /* Clean Green */
  }
  
  .msg-text { 
    color: #e2e8f0;
  }
  
  /* System Message Styling */
  .msg-row.system .msg-sender { color: #fbbf24; } /* Amber */
  .msg-row.system .msg-text { color: #fcd34d; }
  
  .msg-text img { 
    max-width: 150px; 
    max-height: 100px; 
    display: block; 
    margin-top: 4px; 
    border-radius: 4px; 
  }
  
  /* Input Area */
  .input-area {
    padding: 8px 10px;
    background: rgba(0, 0, 0, 0.6);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .chat-input {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  
  .chat-input::placeholder { color: #888; }
  
  /* Privacy Modal */
  .privacy-modal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    padding: 24px;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    display: none;
  }
  
  .privacy-modal.active {
    display: block;
  }

  .modal-title {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 8px;
  }

  .privacy-modal p {
    font-size: 13px;
    line-height: 1.5;
    color: #ccc;
    margin-bottom: 20px;
  }
  
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  
  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }
  
  .btn-primary { background: #4ade80; color: #000; }
  .btn-primary:hover { background: #22c55e; }
  
  .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

</style>
</head>
<body>

<div id="privacyPolicy" class="privacy-modal">
  <div class="modal-title">Privacy Policy</div>
  <p>
    Before joining the chat, please review our Data Privacy Policy.<br><br>
    Your messages, username, and game reports may be stored and reviewed by server administrators for moderation purposes. We do not sell your data.
  </p>
  <div class="modal-actions">
    <button class="btn btn-secondary" onclick="declinePrivacy()">Decline</button>
    <button class="btn btn-primary" onclick="acceptPrivacy()">I Agree</button>
  </div>
</div>

<div id="chatBox" class="chat-container">
  <div class="chat-header">
    <div class="brand">Global Chat</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openDiscord()" title="Join Discord">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
      </button>
      <button class="icon-btn" onclick="openWebsite()" title="Website">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </button>
    </div>
  </div>
  
  <div class="messages" id="messagesList"></div>
  
  <div class="input-area">
    <input type="text" id="chatInput" class="chat-input" placeholder="Say something..." onkeydown="handleInput(event)">
  </div>
</div>

<script>
  function showPrivacy() {
    document.getElementById('privacyPolicy').classList.add('active');
    document.getElementById('chatBox').classList.add('hidden');
  }

  function acceptPrivacy() {
    document.getElementById('privacyPolicy').classList.remove('active');
    document.getElementById('chatBox').classList.remove('hidden');
    if (typeof window.SetPrivacyAccepted === 'function') window.SetPrivacyAccepted();
  }

  function declinePrivacy() {
    if (typeof window.CloseChat === 'function') window.CloseChat();
  }

  function openDiscord() {
    if (typeof window.OpenURL === 'function') window.OpenURL("https://discord.gg/fallenworld");
  }

  function openWebsite() {
    if (typeof window.OpenURL === 'function') window.OpenURL("https://fallenworld.nexus/");
  }

  function onChatOpened() {
    document.getElementById('chatBox').classList.remove('hidden');
    document.getElementById('chatInput').focus();
  }

  function onChatClosed() {
    // optional fade logic
  }

  function receiveMessage(sender, text, timestamp) {
    const list = document.getElementById('messagesList');
    
    const imgRegex = /https?:\/\/[^\s]+\.(png|jpg|jpeg|gif|webp)/i;
    const match = text.match(imgRegex);
    
    let innerHtml = '';
    if (match) {
        innerHtml = text.replace(match[0], `<img src="${match[0]}">`);
    } else {
        innerHtml = text;
    }

    const row = document.createElement('div');
    row.className = sender.toUpperCase() === 'SYSTEM' ? 'msg-row system' : 'msg-row';
    
    // MMO Style text format: [12:00] Player: Message
    row.innerHTML = `
      <span class="msg-time">[${timestamp}]</span>
      <span class="msg-sender">${sender}:</span>
      <span class="msg-text">${innerHtml}</span>
    `;
    
    list.appendChild(row);
    list.scrollTop = list.scrollHeight;
  }

  function handleInput(e) {
    if (e.key === 'Enter') {
      const input = document.getElementById('chatInput');
      const val = input.value.trim();
      if (val) {
        if (typeof window.SendMessage === 'function') window.SendMessage(val);
      }
      input.value = '';
    }
  }
</script>
</body>
</html>
